<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saku</title>
    <style>
      /* Critical inline styles for instant FCP */
      body { margin: 0; background-color: #fbf9f2; }
      #initial-loader {
        position: fixed; inset: 0; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center;
        background-color: #fbf9f2; z-index: 9999; transition: opacity 0.4s ease;
        font-family: system-ui, -apple-system, sans-serif;
      }
      .loader-text {
        color: #9a4021; font-size: 24px; font-weight: bold; letter-spacing: -0.5px;
      }
      .spinner {
        width: 32px; height: 32px; border: 3px solid rgba(154, 64, 33, 0.2);
        border-top-color: #9a4021; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <script>
      // Load Google Fonts non-blockingly after the critical path
      window.addEventListener('load', () => {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = 'https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,700;1,400;1,700&family=Manrope:wght@400;500;600;700&display=swap';
        document.head.appendChild(link);
      });
    </script>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-text">Saku.</div>
      <div class="spinner"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      // Remove loader once the app mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 400);
          }
        }, 100);
      });
    </script>
  </body>
</html>
