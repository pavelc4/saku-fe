<!DOCTYPE html>
<html lang="en" class="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saku - Expressive Commerce Platform</title>
    <meta name="description" content="Saku is an expressive, scholarly concierge for modern retail operations. Intelligence meets commerce." />
    <meta name="keywords" content="POS, Point of Sale, Retail, Commerce, Inventory, Saku, Cloudflare" />
    <meta property="og:title" content="Saku - Expressive Commerce Platform" />
    <meta property="og:description" content="Intelligence meets commerce. Saku combines microsecond edge performance with narrative financial insights." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Saku - Expressive Commerce Platform" />
    <meta name="twitter:description" content="Intelligence meets commerce." />
    <!-- Google Fonts: Newsreader (headline) + Manrope (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..700;1,6..72,300..700&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      body { margin: 0; background-color: #fbf9f2; }
      #initial-loader { position: fixed; inset: 0; display: flex; flex-direction: column; gap: 16px; align-items: center; justify-content: center; background-color: #fbf9f2; z-index: 9999; transition: opacity 0.4s ease; font-family: system-ui, -apple-system, sans-serif; }
      .loader-text { color: #9a4021; font-size: 24px; font-weight: bold; letter-spacing: -0.5px; }
      .spinner { width: 32px; height: 32px; border: 3px solid rgba(154, 64, 33, 0.2); border-top-color: #9a4021; border-radius: 50%; animation: spin 1s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-text">Saku.</div>
      <div class="spinner"></div>
    </div>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('initial-loader');
          if (loader) { loader.style.opacity = '0'; setTimeout(() => loader.remove(), 400); }
        }, 100);
      });
    </script>
  </body>
</html>
